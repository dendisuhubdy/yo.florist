<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Flower Aggregator</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Karla:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f1e6; --paper-deep: #efe7d6; --ink: #22301f; --green: #2f4a32;
    --green-soft: #5c7a54; --poppy: #d94f2b; --poppy-deep: #b93d1e; --rose: #e9b4c0;
    --gold: #c8973e; --line: rgba(34, 48, 31, 0.16);
    --serif: "Fraunces", Georgia, serif; --sans: "Karla", "Helvetica Neue", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--poppy); color: var(--paper); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }
  header { position: sticky; top: 0; z-index: 100; background: color-mix(in srgb, var(--paper) 88%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; max-width: 1180px; margin: 0 auto; }
  .logo { display: flex; align-items: center; gap: 10px; font-family: var(--serif); font-weight: 600; font-size: 1.25rem; color: var(--ink); text-decoration: none; }
  .logo svg { width: 30px; height: 30px; }
  .nav button.plain { color: var(--ink); background: none; border: none; font-size: 0.92rem; font-weight: 600; font-family: var(--sans); cursor: pointer; }
  .nav button.plain:hover { color: var(--poppy); }

  h1 { font-family: var(--serif); font-size: clamp(1.7rem, 3.2vw, 2.3rem); font-weight: 500; padding: 38px 0 6px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin: 10px 0 26px; }
  .chip { background: #fff; border: 1.5px solid var(--ink); border-radius: 100px; padding: 7px 16px; font-size: 0.83rem; font-weight: 700; }
  .chip b { color: var(--poppy); }

  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .tab { background: transparent; border: 1.5px solid var(--ink); border-radius: 100px; padding: 9px 20px; font-family: var(--sans); font-size: 0.88rem; font-weight: 700; cursor: pointer; color: var(--ink); transition: all 0.15s; }
  .tab:hover { background: var(--paper-deep); }
  .tab.on { background: var(--ink); color: var(--paper); }
  .tab .n { color: var(--poppy); }
  .tab.on .n { color: var(--rose); }

  .panel { background: #fff; border: 1.5px solid var(--ink); border-radius: 18px; padding: 22px 24px; margin-bottom: 18px; }
  .shop-head { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; align-items: baseline; }
  .shop-head .name { font-family: var(--serif); font-size: 1.3rem; font-weight: 550; }
  .badge { display: inline-block; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; vertical-align: middle; margin-left: 8px; }
  .badge.pending { background: var(--gold); color: #fff; }
  .badge.active { background: var(--green); color: #fff; }
  .badge.rejected { background: var(--poppy-deep); color: #fff; }
  .badge.suspended { background: var(--ink); color: var(--paper); }
  .meta { font-size: 0.88rem; color: color-mix(in srgb, var(--ink) 68%, transparent); margin-top: 4px; }
  .meta a { color: inherit; }
  .meta a:hover { color: var(--poppy); }
  .desc { font-size: 0.9rem; margin-top: 8px; padding: 10px 14px; background: var(--paper-deep); border-radius: 10px; }
  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { background: var(--green); color: #fff; font-weight: 800; font-size: 0.82rem; padding: 9px 18px; border-radius: 100px; border: none; cursor: pointer; font-family: var(--sans); transition: background 0.15s; }
  .btn:hover { background: var(--green-soft); }
  .btn.danger { background: var(--poppy); }
  .btn.danger:hover { background: var(--poppy-deep); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); }
  .btn:disabled { opacity: 0.5; cursor: wait; }

  .items-strip { display: flex; gap: 10px; overflow-x: auto; margin-top: 14px; padding-bottom: 4px; }
  .mini { flex: 0 0 130px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--paper-deep); }
  .mini img { width: 100%; height: 84px; object-fit: cover; display: block; }
  .mini .noimg { width: 100%; height: 84px; display: grid; place-items: center; font-size: 1.4rem; }
  .mini .t { font-size: 0.72rem; font-weight: 700; padding: 6px 8px 1px; line-height: 1.25; }
  .mini .p { font-size: 0.72rem; color: var(--green-soft); padding: 0 8px 7px; font-weight: 800; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-soft); padding: 8px 10px; border-bottom: 1.5px solid var(--ink); white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tr:hover td { background: var(--paper-deep); }
  .table-scroll { overflow-x: auto; }
  .st { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; white-space: nowrap; }
  .st.paid { background: var(--green); color: #fff; }
  .st.pending_payment { background: var(--gold); color: #fff; }

  .gate { max-width: 460px; margin: 70px auto; }
  .gate input { width: 100%; padding: 12px 15px; border: 1.5px solid var(--ink); border-radius: 12px; font-family: var(--sans); font-size: 0.95rem; outline: none; margin-top: 10px; }
  .gate input:focus { border-color: var(--poppy); }
  .error-line { color: var(--poppy-deep); font-size: 0.88rem; font-weight: 700; margin-top: 10px; min-height: 1.2em; }
  .muted { color: color-mix(in srgb, var(--ink) 55%, transparent); font-size: 0.9rem; }
  #app { display: none; padding-bottom: 90px; }
  #app.show { display: block; }

  /* mobile refinements */
  @media (max-width: 600px) {
    .wrap { padding: 0 16px; }
    .nav { padding: 13px 16px; }
    .logo { font-size: 1.02rem; gap: 7px; }
    .logo svg { width: 25px; height: 25px; }
    input, select, textarea { font-size: 16px; } /* prevents iOS focus zoom */
    h1 { padding: 24px 0 2px; }
    .panel { padding: 16px 14px; }
    .shop-head .name { font-size: 1.1rem; }
    .tab { padding: 8px 14px; font-size: 0.8rem; }
    .chip { font-size: 0.75rem; padding: 6px 12px; }
    table { font-size: 0.78rem; }
    .gate { margin: 40px auto; }
  }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a class="logo" href="/">
      <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <circle cx="20" cy="13" r="6" fill="#d94f2b"/><circle cx="13" cy="20" r="6" fill="#e9b4c0"/>
        <circle cx="27" cy="20" r="6" fill="#c8973e"/><circle cx="20" cy="20" r="4" fill="#22301f"/>
        <path d="M20 24 C20 30 18 34 16 37 M20 24 C20 30 22 34 24 37" stroke="#2f4a32" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Flower&nbsp;Aggregator <span style="font-family:var(--sans);font-size:0.7rem;font-weight:800;letter-spacing:0.12em;color:var(--poppy)">ADMIN</span>
    </a>
    <button class="plain" id="logout" hidden>Log out</button>
  </nav>
</header>

<div class="wrap">
  <div class="gate panel" id="gate">
    <h1 style="padding-top:0">Admin</h1>
    <p class="muted">Enter the admin key to review shop applications and orders.</p>
    <input id="gate-key" type="password" placeholder="Admin key" autocomplete="off">
    <button class="btn" id="gate-go" style="margin-top:14px">Open admin</button>
    <div class="error-line" id="gate-error"></div>
  </div>

  <div id="app">
    <h1>Moderation</h1>
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab on" data-tab="pending">Pending <span class="n" id="n-pending"></span></button>
      <button class="tab" data-tab="active">Approved <span class="n" id="n-active"></span></button>
      <button class="tab" data-tab="rejected">Rejected</button>
      <button class="tab" data-tab="suspended">Suspended</button>
      <button class="tab" data-tab="orders">Orders</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
  const API = "https://api.yo.florist";
  const el = id => document.getElementById(id);
  const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  let KEY = localStorage.getItem("yf_admin_key") || "";
  let TAB = "pending";
  const H = () => ({ "X-Admin-Key": KEY });

  async function api(path, opts = {}) {
    const r = await fetch(`${API}${path}`, { ...opts, headers: { ...H(), ...(opts.headers || {}) } });
    if (r.status === 401) { localStorage.removeItem("yf_admin_key"); location.reload(); throw new Error("auth"); }
    return r.json();
  }

  async function boot() {
    if (!KEY) return;
    try {
      await refreshStats();
      el("gate").style.display = "none";
      el("app").classList.add("show");
      el("logout").hidden = false;
      load();
    } catch {
      el("gate-error").textContent = "That key didn't work.";
    }
  }

  async function refreshStats() {
    const s = await api("/v1/admin/stats");
    const p = s.partners || {}, o = s.orders || {};
    el("stats").innerHTML = `
      <span class="chip">Shops pending <b>${p.pending || 0}</b></span>
      <span class="chip">Approved <b>${p.active || 0}</b></span>
      <span class="chip">Live partner items <b>${s.partner_items || 0}</b></span>
      <span class="chip">Orders paid <b>${o.paid || 0}</b></span>
      <span class="chip">Orders awaiting payment <b>${o.pending_payment || 0}</b></span>`;
    el("n-pending").textContent = p.pending ? `(${p.pending})` : "";
    el("n-active").textContent = p.active ? `(${p.active})` : "";
  }

  function shopCard(p) {
    const links = [
      p.website ? `<a href="${esc(p.website)}" target="_blank" rel="noopener">website</a>` : "",
      p.instagram ? `<a href="${esc(p.instagram)}" target="_blank" rel="noopener">instagram</a>` : "",
    ].filter(Boolean).join(" · ");
    const acts = {
      pending: `<button class="btn" data-act="active" data-id="${p.id}">✓ Approve</button>
                <button class="btn danger" data-act="rejected" data-id="${p.id}">✕ Reject</button>`,
      active: `<button class="btn danger" data-act="suspended" data-id="${p.id}">Suspend</button>`,
      rejected: `<button class="btn" data-act="active" data-id="${p.id}">Approve anyway</button>`,
      suspended: `<button class="btn" data-act="active" data-id="${p.id}">Reinstate</button>`,
    }[p.status] || "";
    return `
      <div class="panel" id="shop-${p.id}">
        <div class="shop-head">
          <div>
            <span class="name">${esc(p.shop_name)}</span>
            <span class="badge ${esc(p.status)}">${esc(p.status)}</span>
            <div class="meta">
              ${esc(p.city)}, ${esc(p.country)} (${esc(p.iso2)}) · applied ${esc((p.created_at || "").slice(0, 10))} ·
              <a href="mailto:${esc(p.email)}">${esc(p.email)}</a>${p.phone ? " · " + esc(p.phone) : ""}${links ? " · " + links : ""}
            </div>
          </div>
          <div class="muted">${p.item_count} item${p.item_count === 1 ? "" : "s"}</div>
        </div>
        ${p.description ? `<div class="desc">${esc(p.description)}</div>` : ""}
        <div class="items-strip" id="items-${p.id}"><span class="muted">${p.item_count ? "Loading items…" : "No items uploaded yet."}</span></div>
        <div class="actions">${acts}</div>
      </div>`;
  }

  async function load() {
    if (TAB === "orders") return loadOrders();
    const d = await api(`/v1/admin/partners?status=${TAB}`);
    el("list").innerHTML = d.partners.map(shopCard).join("") ||
      `<p class="muted">Nothing in “${TAB}”.</p>`;
    d.partners.filter(p => p.item_count > 0).forEach(async p => {
      const it = await api(`/v1/admin/partners/${p.id}/items`);
      const strip = el(`items-${p.id}`);
      if (strip) strip.innerHTML = it.items.filter(i => i.status === "active").map(i => `
        <div class="mini">
          ${i.image ? `<img src="${esc(i.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=noimg>🌸</div>'">` : `<div class="noimg">🌸</div>`}
          <div class="t">${esc(i.title)}</div><div class="p">${esc(i.currency)} ${esc(i.price)}</div>
        </div>`).join("") || '<span class="muted">No live items.</span>';
    });
    el("list").querySelectorAll("[data-act]").forEach(b => b.addEventListener("click", async () => {
      const verb = { active: "Approve", rejected: "Reject", suspended: "Suspend" }[b.dataset.act] || b.dataset.act;
      b.disabled = true; b.textContent = verb + "…";
      await api(`/v1/admin/partners/${b.dataset.id}/status?status=${b.dataset.act}`, { method: "POST" });
      el(`shop-${b.dataset.id}`).remove();
      refreshStats();
    }));
  }

  async function loadOrders() {
    const d = await api("/v1/admin/orders?limit=100");
    el("list").innerHTML = `
      <div class="panel table-scroll"><table>
        <tr><th>Order</th><th>Placed</th><th>Status</th><th>Item</th><th>Amount</th><th>Fulfilled by</th><th>Deliver</th><th>Customer</th></tr>
        ${d.orders.map(o => `
          <tr>
            <td><b>${esc(o.id)}</b></td>
            <td>${esc((o.created_at || "").replace("T", " ").slice(0, 16))}</td>
            <td><span class="st ${esc(o.status)}">${esc(o.status).replace("_", " ")}</span></td>
            <td>${esc(o.item_title || "florist's choice")}</td>
            <td>${o.item_price ? esc(o.item_currency || "") + " " + esc(o.item_price) : "USD " + esc(o.budget_usd || "")}</td>
            <td>${esc(o.florist)}${o.partner_id ? " ✦" : ""} (${esc(o.iso2)})</td>
            <td>${esc(o.delivery_date || "—")} ${esc(o.delivery_time || "")}${o.confirm_time_with_customer ? " ☎ agree time" : ""}</td>
            <td>${esc(o.customer_name || "")}<br><span class="muted">${esc(o.email || "")}</span></td>
          </tr>`).join("")}
      </table></div>
      <p class="muted">✦ = partner shop upload · ☎ = florist should call the recipient to agree a delivery time</p>`;
  }

  document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("on"));
    t.classList.add("on");
    TAB = t.dataset.tab;
    el("list").innerHTML = '<p class="muted">Loading…</p>';
    load();
  }));

  el("gate-go").addEventListener("click", () => {
    KEY = el("gate-key").value.trim();
    if (!KEY) { el("gate-error").textContent = "Enter the admin key."; return; }
    localStorage.setItem("yf_admin_key", KEY);
    boot();
  });
  el("gate-key").addEventListener("keydown", e => { if (e.key === "Enter") el("gate-go").click(); });
  el("logout").addEventListener("click", () => { localStorage.removeItem("yf_admin_key"); location.reload(); });

  boot();
</script>
</body>
</html>
